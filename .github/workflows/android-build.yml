name: yozora-store

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar Código
      uses: actions/checkout@v4

    - name: Configurar Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Configurar Keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/yozora.keystore

    - name: Compilar APK Release
      run: |
        cd android_app
        gradle assembleRelease
      env:
        KEYSTORE_PATH: ${{ runner.temp }}/yozora.keystore
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: Subir APK Release
      uses: actions/upload-artifact@v4
      with:
        name: yozora-store
        path: android_app/build/outputs/apk/release/*.apk